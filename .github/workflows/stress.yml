name: Stress (siege)

# Manual trigger only - this is an expensive job and audit-style check.
# Run from the GitHub Actions UI -> Stress (siege) -> Run workflow.
on:
  workflow_dispatch:
    inputs:
      duration:
        description: "Siege duration (e.g. 30S, 1M)"
        required: false
        default: "30S"
      concurrency:
        description: "Siege concurrent users"
        required: false
        default: "25"

env:
  CARGO_TERM_COLOR: always

jobs:
  siege:
    name: Siege availability >= 99.5%
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: stress-${{ runner.os }}

      - name: Install siege
        run: brew install siege

      - name: Build release binary
        run: cargo build --release --locked

      - name: Start server in background
        run: |
          ./target/release/localhost config.example.toml > server.log 2>&1 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          # Wait for the server to start listening on 8080.
          for i in $(seq 1 30); do
            if nc -z 127.0.0.1 8080; then
              echo "Server up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start" >&2
          cat server.log
          exit 1

      - name: Run siege
        id: siege
        run: |
          set -o pipefail
          siege -b -c "${{ github.event.inputs.concurrency }}" \
                   -t "${{ github.event.inputs.duration }}" \
                   http://127.0.0.1:8080/ 2>&1 | tee siege.log

      - name: Assert availability >= 99.5%
        run: |
          # siege prints e.g.  "Availability:                 100.00 %"
          AVAIL=$(grep -E '^Availability' siege.log | awk '{print $2}' | tr -d '%')
          echo "Reported availability: ${AVAIL}%"
          # bc returns 1 if true.
          if [ "$(echo "${AVAIL} >= 99.5" | bc -l)" -ne 1 ]; then
            echo "FAIL: availability ${AVAIL}% is below the 99.5% audit threshold." >&2
            exit 1
          fi
          echo "PASS: availability ${AVAIL}% meets the 99.5% audit threshold."

      - name: Stop server
        if: always()
        run: |
          if [ -n "${SERVER_PID:-}" ]; then
            kill "${SERVER_PID}" 2>/dev/null || true
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-logs
          path: |
            server.log
            siege.log
          if-no-files-found: warn
